[project]
name = "taskdog-client"
version = "0.18.1"
description = "HTTP API client for Taskdog server"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Kohei Wada" }
]
license = { text = "MIT" }
keywords = ["task", "management", "api-client"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "taskdog-core==0.18.1",
    "httpx>=0.27.0",
    "websockets>=14.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=1.0.0",
    "mypy>=1.0.0",
    "ruff>=0.7.0",
]

[project.urls]
Homepage = "https://github.com/Kohei-Wada/taskdog"
Repository = "https://github.com/Kohei-Wada/taskdog"
"Bug Tracker" = "https://github.com/Kohei-Wada/taskdog/issues"

[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = [
    "taskdog_client",
    "taskdog_client.converters",
    "taskdog_client.websocket",
]
package-dir = { "" = "src" }

[tool.setuptools.package-data]
taskdog_client = ["py.typed"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_unused_ignores = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
